<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>سوق باي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Pi Network SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body { font-family: Tahoma; padding: 20px; background: #f7f7f7; }
    .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    input, textarea { width: 100%; padding: 8px; margin: 5px 0; }
    button { padding: 10px 15px; background: #673ab7; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>

<body>

  <h1>سوق باي</h1>

  <div class="card" id="auth-section">
    <button id="pi-login-btn">تسجيل الدخول عبر Pi</button>
    <p id="user-info"></p>
    <p id="user-balance"></p>
  </div>

  <div class="card" id="add-listing-section" style="display:none;">
    <h2>إضافة إعلان</h2>
    <input id="listing-title" placeholder="عنوان الإعلان" />
    <input id="listing-price" placeholder="السعر" type="number" />
    <textarea id="listing-description" placeholder="وصف الإعلان"></textarea>
    <button id="add-listing-btn">نشر الإعلان</button>
  </div>

  <div class="card">
    <h2>الإعلانات</h2>
    <div id="listings-container"></div>
  </div>

<script>
/* ---------------------------
   تهيئة Pi SDK
---------------------------- */
Pi.init({ version: "2.0" });

let currentUser = null;

/* ---------------------------
   تسجيل الدخول عبر Pi
---------------------------- */
async function loginWithPi() {
  try {
    const scopes = ["username", "payments"];
    const auth = await Pi.authenticate(scopes, (payment) => {
      console.log("Incomplete payment:", payment);
    });

    currentUser = {
      piUserId: auth.user.uid,
      username: auth.user.username,
      walletAddress: auth.user.wallet_address
    };

    document.getElementById("user-info").innerText =
      `مرحبًا ${currentUser.username} — Pi ID: ${currentUser.piUserId}`;

    const balance = await getPiBalance(currentUser.walletAddress);
    document.getElementById("user-balance").innerText =
      `رصيدك: ${balance} PI`;

    document.getElementById("add-listing-section").style.display = "block";

  } catch (err) {
    alert("فشل تسجيل الدخول عبر Pi");
    console.error(err);
  }
}

/* ---------------------------
   جلب رصيد محفظة Pi
---------------------------- */
async function getPiBalance(wallet) {
  try {
    const res = await fetch(`https://api.minepi.com/v2/accounts/${wallet}`);
    const data = await res.json();
    return data.balance || 0;
  } catch {
    return 0;
  }
}

/* ---------------------------
   إضافة إعلان (يُخزن محليًا)
---------------------------- */
function addListing() {
  if (!currentUser) return alert("سجل الدخول أولاً");

  const title = document.getElementById("listing-title").value;
  const price = document.getElementById("listing-price").value;
  const description = document.getElementById("listing-description").value;

  const listing = {
    id: Date.now(),
    title,
    price,
    description,
    owner: currentUser.username,
    ownerPiUserId: currentUser.piUserId
  };

  const listings = JSON.parse(localStorage.getItem("listings") || "[]");
  listings.push(listing);
  localStorage.setItem("listings", JSON.stringify(listings));

  loadListings();
}

/* ---------------------------
   تحميل الإعلانات
---------------------------- */
function loadListings() {
  const listings = JSON.parse(localStorage.getItem("listings") || "[]");
  const container = document.getElementById("listings-container");

  container.innerHTML = "";

  listings.forEach(l => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <h3>${l.title}</h3>
      <p>السعر: ${l.price} PI</p>
      <p>${l.description}</p>
      <small>البائع: ${l.owner} — ${l.ownerPiUserId}</small>
    `;
    container.appendChild(div);
  });
}

/* ---------------------------
   ربط الأحداث
---------------------------- */
document.getElementById("pi-login-btn").addEventListener("click", loginWithPi);
document.getElementById("add-listing-btn").addEventListener("click", addListing);

loadListings();
</script>

</body>
</html>
