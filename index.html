<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>متجر GCV - دفع مباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
      :root {
        --bg-color: #f4f7fe;
        --primary-purple: #6c5ce7;
        --gold: #fbc531;
      }
      body { margin: 0; background-color: var(--bg-color); font-family: 'Cairo', sans-serif; padding-bottom: 50px; }
      .container { padding: 15px; }
      .header-title { text-align: center; padding: 20px; background: #fff; margin-bottom: 10px; }
      .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
      .card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; border: 1px solid #eee; }
      .card-img { height: 120px; width: 100%; object-fit: cover; }
      .card-content { padding: 12px; }
      .card-title { font-size: 13px; font-weight: 700; height: 35px; margin-bottom: 5px; }
      .price-pi { font-size: 14px; font-weight: 800; color: var(--primary-purple); display: block; margin-bottom: 10px; }
      .btn-buy { width: 100%; background: var(--primary-purple); color: #fff; border: none; padding: 10px; border-radius: 10px; font-family: 'Cairo'; font-weight: 700; cursor: pointer; transition: 0.3s; }
      .btn-buy:active { transform: scale(0.95); opacity: 0.8; }
      #status-msg { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #333; color: #fff; padding: 10px; border-radius: 10px; text-align: center; font-size: 12px; display: none; z-index: 10000; }
    </style>
  </head>
  <body>

    <div id="status-msg">جاري المعالجة...</div>

    <div class="header-title">
      <h2 style="margin:0">سوق Pi (قيمة GCV)</h2>
      <p style="font-size: 11px; color: #666;">سعر الباي: 1,178,133.75 ريال</p>
    </div>

    <div class="container">
      <div class="products-grid">
        
        <div class="card">
          <img src="https://images.unsplash.com/photo-1663499482523-1c0c1b489467?q=80&w=400" class="card-img">
          <div class="card-content">
            <div class="card-title">آيفون 16 برو ماكس</div>
            <div class="price-pi">π <span class="calc-pi" data-sar="5000"></span></div>
            <button class="btn-buy" onclick="handlePayment(5000, 'آيفون 16 برو ماكس')">شراء الآن</button>
          </div>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1606206161413-568e9167262c?q=80&w=400" class="card-img">
          <div class="card-content">
            <div class="card-title">تويوتا كامري 2023</div>
            <div class="price-pi">π <span class="calc-pi" data-sar="120000"></span></div>
            <button class="btn-buy" onclick="handlePayment(120000, 'تويوتا كامري 2023')">شراء الآن</button>
          </div>
        </div>

      </div>
    </div>

    <script>
      const GCV_SAR = 1178133.75; // قيمة الإجماع بالريال

      // 1. حساب الأسعار وعرضها عند التحميل
      function updateDisplayPrices() {
        document.querySelectorAll('.calc-pi').forEach(el => {
          const sar = parseFloat(el.getAttribute('data-sar'));
          el.textContent = (sar / GCV_SAR).toFixed(7);
        });
      }
      window.onload = updateDisplayPrices;

      // 2. وظيفة الدفع الفعلي عبر Pi SDK
      async function handlePayment(sarAmount, productName) {
        const piAmount = (sarAmount / GCV_SAR).toFixed(7);
        const statusBox = document.getElementById('status-msg');

        if (!window.Pi) {
          alert("الرجاء فتح التطبيق من متصفح Pi");
          return;
        }

        try {
          statusBox.style.display = "block";
          statusBox.textContent = "جاري تحضير عملية الدفع لـ " + productName;

          const payment = await window.Pi.createPayment({
            amount: parseFloat(piAmount),
            memo: "شراء " + productName + " من متجر حراج باي",
            metadata: { sar_price: sarAmount, product: productName }
          }, {
            onReadyForServerApproval: (paymentId) => {
              statusBox.textContent = "بانتظار موافقة الخادم...";
              // هنا يجب إرسال paymentId لخادمك (Netlify Function) للموافقة
              console.log("Payment ID:", paymentId);
            },
            onReadyForServerCompletion: (paymentId, txid) => {
              statusBox.textContent = "تم الدفع بنجاح! رقم المعاملة: " + txid;
              alert("شكراً لك! تم استلام " + piAmount + " Pi بنجاح.");
            },
            onCancel: (paymentId) => {
              statusBox.textContent = "تم إلغاء العملية";
              setTimeout(() => statusBox.style.display = "none", 3000);
            },
            onError: (error, payment) => {
              statusBox.textContent = "خطأ: " + error.message;
            }
          });
        } catch (err) {
          statusBox.textContent = "فشلت العملية: " + err.message;
        }
      }

      // تهيئة Pi SDK
      if (window.Pi) {
        window.Pi.init({ version: "2.0", sandbox: false });
      }
    </script>
  </body>
</html>
